version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: monthly
      day: monday
    open-pull-requests-limit: 5
    groups:
      # Bundle dev-only updates into a single PR per month to keep noise
      # low. Security advisories still open their own PRs immediately,
      # independent of this schedule.
      dev-dependencies:
        dependency-type: development
        update-types: [minor, patch]
    ignore:
      # @types/vscode must stay <= engines.vscode floor (^1.85.0).
      # vsce rejects packages where the typings promise APIs newer than
      # the declared minimum runtime. Allow patch bumps only.
      - dependency-name: "@types/vscode"
        update-types:
          - "version-update:semver-major"
          - "version-update:semver-minor"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
      day: monday
    open-pull-requests-limit: 3
