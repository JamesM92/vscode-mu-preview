name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: Build & package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compile TypeScript
        run: npm run compile

      - name: Verify VSIX packages cleanly
        run: npx -y @vscode/vsce package --no-dependencies -o /tmp/dryrun.vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: vsix-dryrun
          path: /tmp/dryrun.vsix
          retention-days: 7

  audit:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Fail only on high/critical advisories. Moderate/low are usually
      # transitive devDependency issues we can't act on without waiting
      # for upstream fixes.
      - name: Audit dependencies
        run: npm audit --audit-level=high
